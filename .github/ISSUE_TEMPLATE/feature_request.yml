name: Feature request
description: Suggest an improvement or new feature for pywa. Explain the problem and a proposed solution.
title: "Feature: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. The fields below will help maintainers understand the problem and your proposal.
  - type: input
    id: summary
    attributes:
      label: Short summary
      validations:
        required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the problem or pain point this feature would address
      validations:
        required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe your proposed solution or API design
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other notes, links or screenshots
