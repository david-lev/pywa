name: Bug report
description: Report a bug in pywa. Please provide reproducible steps, environment info and a minimal example when possible.
title: "Bug: "
labels: [ bug ]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill the fields below with as much detail as you can.
  - type: input
    id: summary
    attributes:
      label: Short summary
      description: One-line summary of the bug
      placeholder: e.g. Sending a message fails with 500
      validations:
        required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide step-by-step instructions to reproduce the bug
      placeholder: 1) ...\n2) ...\n3) ...
      validations:
        required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen
  - type: textarea
    id: logs
    attributes:
      label: Logs / Traceback
      description: Paste full traceback or relevant logs (if any)
  - type: dropdown
    id: pywa_version
    attributes:
      label: pywa version
      description: Select the pywa version you are using
      options:
        - label: 4.x (current)
          value: 4.x
        - label: 3.x or older
          value: <4.0
        - label: other
          value: other
  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: e.g. 3.11
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 13.6
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Minimal code that reproduces the issue (if possible)
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context or notes
